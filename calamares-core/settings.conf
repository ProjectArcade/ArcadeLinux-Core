modules-search: [ local ]

instances:
- id:       kms
  module:   shellprocess
  config:   shellprocess_kms.conf
- id:       autologin
  module:   contextualprocess
  config:   contextualprocess_autologin.conf

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - summary
- exec:
 - partition
  - mount
  - unpackfs
  - machineid
  - fstab
  - locale
  - keyboard
  - localecfg
  - users
  - displaymanager
  - networkcfg
  - hwclock
  - services-systemd
  - grubcfg
 - bootloader
  - packages
  - removeuser
  - umount
- show:
  - finished

branding: arcade
prompt-install: false
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false
hide-back-and-next-during-exec: false
quit-at-end: false

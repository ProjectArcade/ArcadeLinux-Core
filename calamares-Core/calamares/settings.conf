modules-search: [ local]

sequence:
  - show:
      - welcomeq
      - localeq
      - keyboardq
      - partition
      - usersq
      - summaryq
  - exec:
      - partition
      - mount
      - unpackfs
      - machineid
      - fstab
      - locale
      - keyboard
      - localecfg
      - users
      - networkcfg
      - hwclock
      - services-systemd
      - bootloader
      - packages
      - removeuser
      - umount
  - show:
      - finishedq

branding: arcade
prompt-install: false
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: true
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Dark background -->
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#2f3242"/>
      <stop offset="100%" stop-color="#1c1e2b"/>
    </radialGradient>

    <!-- Folder body -->
    <linearGradient id="folder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>

    <!-- Folder tab -->
    <linearGradient id="tab" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>

    <!-- Highlight glow -->
    <linearGradient id="highlight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
      <feOffset dx="0" dy="10"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- Background -->
  <rect x="32" y="32" width="960" height="960" rx="240" fill="url(#bg)"/>

  <!-- Folder -->
  <g filter="url(#shadow)">

    <!-- Top tab -->
    <path d="
      M220 360
      Q220 300 280 300
      L420 300
      Q460 300 490 330
      L540 380
      L220 380
      Z"
      fill="url(#tab)"/>

    <!-- Main folder -->
    <path d="
      M200 380
      Q200 340 240 340
      L784 340
      Q824 340 824 380
      L824 720
      Q824 780 760 780
      L264 780
      Q200 780 200 720
      Z"
      fill="url(#folder)"/>

    <!-- Soft highlight -->
    <rect x="220" y="400" width="560" height="50" rx="25" fill="url(#highlight)"/>

  </g>

</svg>